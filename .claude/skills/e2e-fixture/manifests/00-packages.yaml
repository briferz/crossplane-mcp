# provider-nop lets a managed resource be made "stuck" without any cloud creds.
# function-patch-and-transform composes it from the XR.
# NOTE: verify current versions on the marketplace if these don't become Healthy.
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-nop
spec:
  # v0.5.0 is the latest and is compatible with Crossplane v2 namespaced resources.
  package: xpkg.crossplane.io/crossplane-contrib/provider-nop:v0.5.0
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.10.6
