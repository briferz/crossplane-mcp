# GoReleaser builds the cross-platform binaries, checksums, GitHub release notes,
# and the Homebrew formula. The container image is built separately in the
# release workflow via buildx (see .github/workflows/release.yml).
#
# Validate locally with: goreleaser check
version: 2

project_name: crossplane-mcp

before:
  hooks:
    # download (not tidy) so a release build on the tagged commit can't dirty
    # go.mod/go.sum and fail `release --clean`.
    - go mod download

builds:
  - id: crossplane-mcp
    main: ./cmd/crossplane-mcp
    binary: crossplane-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

# release-please owns the changelog (CHANGELOG.md) and the GitHub release notes.
changelog:
  disable: true

homebrew_casks:
  - name: crossplane-mcp
    repository:
      owner: briferz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/briferz/crossplane-mcp"
    description: "Read-only diagnostic MCP server for Crossplane"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    # The released binaries are unsigned; strip the macOS quarantine flag on
    # install so the cask runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/crossplane-mcp"]
          end

release:
  # release-please has already created the GitHub release for the tag; just
  # upload the binaries/checksums to it without touching its notes.
  # (prerelease is left to release-please, so GoReleaser's prerelease:auto is
  # omitted — keep-existing would not change an existing release's flag anyway.)
  mode: keep-existing
