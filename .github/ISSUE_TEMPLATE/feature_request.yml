name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Note the project scope: `crossplane-mcp` is a
        **read-only diagnostic** server — it never mutates cluster state.
        Proposals should fit that (see CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the diagnostic pain point or gap, not just a proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the server to do? A new tool, more detail in an existing one, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or how you work around this today.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays within read-only diagnostics (no cluster mutation).
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
